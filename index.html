<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Castle · Catálogo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0a0a0a;
    --surface: #141414;
    --surface-2: #1c1c1c;
    --line: #2a2a2a;
    --green: #c6ff1a;
    --pink: #ff2e7e;
    --white: #f4f4f2;
    --muted: #8f8f8a;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--white);font-family:'Archivo',sans-serif;}
  ::selection{background:var(--green);color:#0a0a0a;}

  .display{font-family:'Anton',sans-serif; text-transform:uppercase; letter-spacing:0.5px;}
  .mono{font-family:'Space Mono',monospace;}

  /* HEADER */
  header{
    position:relative;
    padding:28px 24px 34px;
    text-align:center;
    border-bottom:2px solid var(--green);
    overflow:hidden;
  }
  header::before{
    content:"";
    position:absolute; inset:0;
    background:
      radial-gradient(circle at 15% 20%, rgba(198,255,26,0.08), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(255,46,126,0.08), transparent 40%);
    pointer-events:none;
  }
  .logo-wrap{position:relative;}
  .logo-wrap img{height:130px; width:auto; display:block; margin:0 auto 6px;}
  .brand-sub{
    font-family:'Space Mono',monospace;
    font-size:11px;
    letter-spacing:4px;
    color:var(--pink);
    text-transform:uppercase;
    margin-top:2px;
  }
  .brand-sub span{color:var(--green);}

  .topbar{
    display:flex; justify-content:space-between; align-items:center;
    max-width:1100px; margin:0 auto; padding:14px 20px 0;
    position:relative; z-index:1;
  }
  .brand-tiny{
    font-family:'Anton',sans-serif; letter-spacing:1px; font-size:15px; color:var(--white);
  }
  .admin-toggle{
    background:transparent; border:1.5px solid var(--line); color:var(--muted);
    font-family:'Space Mono',monospace; font-size:11px; text-transform:uppercase;
    letter-spacing:1.5px; padding:8px 14px; border-radius:2px; cursor:pointer;
    transition: all .15s ease;
  }
  .admin-toggle:hover{ border-color:var(--green); color:var(--green); }
  .admin-toggle.active{ border-color:var(--pink); color:var(--pink); background:rgba(255,46,126,0.08); }

  /* HERO STATEMENT */
  .hero{
    max-width:1100px; margin:0 auto; padding:40px 24px 8px;
  }
  .hero h1{
    font-size:clamp(38px,7vw,72px);
    line-height:0.92;
    margin:0;
    position:relative;
    display:inline-block;
  }
  .hero h1 .stroke{
    position:relative;
  }
  .hero h1 .stroke::after{
    content:"";
    position:absolute; left:-2%; right:-2%; bottom:6px; height:14px;
    background:var(--pink);
    z-index:-1;
    transform:skewX(-8deg);
    opacity:0.85;
  }
  .hero p{
    font-family:'Space Mono',monospace; color:var(--muted); font-size:13px;
    margin:14px 0 0; max-width:480px;
  }

  /* FILTERS */
  .filters{
    max-width:1100px; margin:0 auto; padding:22px 24px 0;
    display:flex; flex-wrap:wrap; gap:8px;
  }
  .chip{
    font-family:'Space Mono',monospace; font-size:12px; text-transform:uppercase;
    letter-spacing:1px; padding:8px 16px; border-radius:2px;
    border:1.5px solid var(--line); background:transparent; color:var(--muted);
    cursor:pointer; transition:all .15s ease;
    -webkit-tap-highlight-color:transparent; touch-action:manipulation;
  }
  @media (hover: hover){
    .chip:hover{ border-color:var(--green); color:var(--white); }
  }
  .chip.active{ background:var(--green); border-color:var(--green); color:#0a0a0a; font-weight:700; }

  /* GRID */
  .grid-wrap{ max-width:1100px; margin:0 auto; padding:24px 24px 60px; }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(220px,1fr));
    gap:20px;
  }
  .card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:2px;
    overflow:hidden;
    position:relative;
    transition: border-color .15s ease, transform .15s ease;
    -webkit-tap-highlight-color:transparent;
  }
  @media (hover: hover){
    .card:hover{ border-color:var(--green); transform:translateY(-3px); }
  }
  .card .img-box{
    width:100%; aspect-ratio:4/5; background:#000;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden; cursor:pointer;
  }
  .card .img-box img{ width:100%; height:100%; object-fit:cover; }
  .card .cat-tag{
    position:absolute; top:10px; left:10px;
    background:var(--pink); color:#2a0011;
    font-family:'Space Mono',monospace; font-size:10px; text-transform:uppercase;
    letter-spacing:1px; padding:4px 8px; border-radius:2px; font-weight:700;
  }
  .card .info{ padding:14px 14px 16px; }
  .card .info h3{
    font-family:'Anton',sans-serif; font-size:18px; margin:0 0 6px; letter-spacing:0.5px;
  }
  .card .price{
    font-family:'Space Mono',monospace; color:var(--green); font-size:16px; font-weight:700; margin:0 0 6px;
  }
  .card .sizes{
    font-family:'Space Mono',monospace; color:var(--muted); font-size:11px; letter-spacing:1px;
  }
  .card .admin-actions{
    display:flex; gap:8px; margin-top:12px;
  }
  .icon-btn{
    flex:1; background:var(--surface-2); border:1px solid var(--line); color:var(--white);
    padding:8px 0; border-radius:2px; cursor:pointer; font-size:13px;
    display:flex; align-items:center; justify-content:center; gap:6px;
    transition:all .15s ease; -webkit-tap-highlight-color:transparent; touch-action:manipulation;
  }
  @media (hover: hover){
    .icon-btn:hover{ border-color:var(--green); }
    .icon-btn.danger:hover{ border-color:var(--pink); color:var(--pink); }
  }

  /* EMPTY STATE */
  .empty{
    text-align:center; padding:70px 20px; color:var(--muted);
    border:1.5px dashed var(--line); border-radius:2px;
  }
  .empty h3{ font-family:'Anton',sans-serif; color:var(--white); font-size:22px; margin:0 0 8px; }
  .empty p{ font-family:'Space Mono',monospace; font-size:12px; margin:0 0 18px; }

  /* ADMIN PANEL */
  .admin-panel{
    max-width:1100px; margin:0 auto; padding:0 24px 20px;
  }
  .admin-form{
    background:var(--surface); border:1px solid var(--green);
    border-radius:2px; padding:22px; margin-bottom:26px;
  }
  .admin-form h2{
    font-family:'Anton',sans-serif; font-size:20px; margin:0 0 16px; color:var(--green);
  }
  .form-row{ display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
  .form-row.full{ grid-template-columns:1fr; }
  .field label{
    display:block; font-family:'Space Mono',monospace; font-size:11px; text-transform:uppercase;
    letter-spacing:1px; color:var(--muted); margin-bottom:6px;
  }
  .field input[type=text], .field input[type=number]{
    width:100%; background:var(--surface-2); border:1px solid var(--line); color:var(--white);
    padding:10px 12px; border-radius:2px; font-family:'Archivo',sans-serif; font-size:14px;
  }
  .field input:focus{ outline:none; border-color:var(--green); }
  .upload-box{
    border:2px dashed var(--line); border-radius:2px; padding:20px; text-align:center;
    cursor:pointer; transition:all .15s ease; position:relative;
  }
  .upload-box:hover{ border-color:var(--green); }
  .upload-box.has-img{ padding:0; border-style:solid; }
  .upload-box img{ width:100%; max-height:220px; object-fit:contain; display:block; background:#000; }
  .upload-box input[type=file]{ display:none; }
  .upload-hint{ font-family:'Space Mono',monospace; font-size:11px; color:var(--muted); }
  .btn{
    font-family:'Space Mono',monospace; text-transform:uppercase; letter-spacing:1.5px;
    font-size:12px; font-weight:700; padding:12px 22px; border-radius:2px; cursor:pointer;
    border:none; transition:all .15s ease; -webkit-tap-highlight-color:transparent; touch-action:manipulation;
  }
  .btn-primary{ background:var(--green); color:#0a0a0a; }
  .btn-ghost{ background:transparent; border:1.5px solid var(--line); color:var(--white); }
  @media (hover: hover){
    .btn-primary:hover{ filter:brightness(1.08); }
    .btn-ghost:hover{ border-color:var(--pink); color:var(--pink); }
  }
  .form-actions{ display:flex; gap:10px; margin-top:6px; }
  .error-msg{ color:var(--pink); font-family:'Space Mono',monospace; font-size:12px; margin:8px 0 0; }

  /* MODAL */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.82); z-index:100;
    display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .modal{
    background:var(--surface); border:1px solid var(--line); border-radius:2px;
    max-width:420px; width:100%; overflow:hidden;
  }
  .modal img{ width:100%; aspect-ratio:4/5; object-fit:cover; display:block; }
  .modal .modal-body{ padding:20px; }
  .modal h3{ font-family:'Anton',sans-serif; font-size:24px; margin:0 0 8px; }
  .modal .price{ font-family:'Space Mono',monospace; color:var(--green); font-size:18px; font-weight:700; }
  .modal .sizes{ font-family:'Space Mono',monospace; color:var(--muted); font-size:12px; margin-top:8px; letter-spacing:1px; }
  .modal-close{
    width:100%; margin-top:16px; padding:12px; background:transparent;
    border:1.5px solid var(--line); color:var(--white); border-radius:2px; cursor:pointer;
    font-family:'Space Mono',monospace; text-transform:uppercase; letter-spacing:1px; font-size:12px;
  }
  .modal-close:hover{ border-color:var(--green); color:var(--green); }

  .pin-modal .modal-body{ text-align:center; }
  .pin-modal input{
    width:100%; background:var(--surface-2); border:1px solid var(--line); color:var(--white);
    padding:12px; border-radius:2px; text-align:center; font-family:'Space Mono',monospace;
    font-size:15px; letter-spacing:1px; margin-bottom:12px;
  }
  .pin-modal input:focus{ outline:none; border-color:var(--green); }

  .footer-note{
    text-align:center; padding:20px; font-family:'Space Mono',monospace;
    font-size:10px; color:var(--muted); letter-spacing:1px;
  }
  .footer-note .wa-number{
    display:block; margin-top:6px; color:var(--green); font-size:11px; letter-spacing:1px;
  }

  .whatsapp-fab{
    position:fixed; bottom:22px; right:22px; z-index:90;
    width:56px; height:56px; border-radius:50%;
    background:#25D366; display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 14px rgba(0,0,0,0.4);
    text-decoration:none; border:2px solid #0a0a0a;
    transition:transform .15s ease;
  }
  @media (hover: hover){
    .whatsapp-fab:hover{ transform:scale(1.07); }
  }
  .whatsapp-fab{ -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
  .whatsapp-fab svg{ width:28px; height:28px; }

  .modal-whatsapp{
    display:flex; align-items:center; justify-content:center; gap:8px;
    width:100%; margin-top:10px; padding:12px; background:#25D366; color:#062712;
    border:none; border-radius:2px; cursor:pointer; text-decoration:none;
    font-family:'Space Mono',monospace; text-transform:uppercase; letter-spacing:1px;
    font-size:12px; font-weight:700;
  }
  .modal-whatsapp:hover{ filter:brightness(1.05); }
  .modal-whatsapp svg{ width:16px; height:16px; }

  @media (max-width:560px){
    .form-row{ grid-template-columns:1fr; }
    .grid{ grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px; }
  }
</style>
</head>

<script>
const STORAGE_KEY = "urbancastle_catalog_v1";
const ADMIN_PIN = "Jonny12012006";
const WHATSAPP_NUMBER = "593983376891";
const WHATSAPP_ICON = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M20.52 3.449C18.24 1.245 15.24 0 12.045 0 5.463 0 .104 5.334.101 11.888c-.001 2.096.548 4.142 1.588 5.945L0 24l6.304-1.654a11.86 11.86 0 005.741 1.464h.005c6.582 0 11.94-5.334 11.943-11.89a11.821 11.821 0 00-3.473-8.471zM12.05 21.785h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.845 9.845 0 01-1.51-5.264c.002-5.445 4.436-9.877 9.889-9.877 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.446-4.437 9.881-9.886 9.881z"/></svg>`;

function buildWhatsappLink(){
  const msg = "Hola! Te escribo por una prenda del catálogo de Urban Castle.";
  return `https://api.whatsapp.com/send?phone=${WHATSAPP_NUMBER}&text=${encodeURIComponent(msg)}`;
}
let products = [];
let isAdmin = false;
let activeCategory = "Todas";
let editingId = null;
let pendingImageData = null;

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
}

const FIREBASE_DB_URL = "https://urban-castle-catalogo-default-rtdb.firebaseio.com";

const LOCAL_CACHE_KEY = "urbancastle_catalog_cache_v1";

function loadFromLocalCache(){
  try{
    const cached = localStorage.getItem(LOCAL_CACHE_KEY);
    if(cached){
      const data = JSON.parse(cached);
      if(Array.isArray(data) && data.length){
        products = data;
        renderFilters();
        renderGrid();
        return true;
      }
    }
  }catch(e){ /* si falla el caché, no pasa nada, seguimos con la red */ }
  return false;
}

function saveToLocalCache(list){
  try{
    localStorage.setItem(LOCAL_CACHE_KEY, JSON.stringify(list));
  }catch(e){ /* si el navegador no tiene espacio, lo ignoramos */ }
}

async function loadCatalog(){
  const hadCache = loadFromLocalCache();
  try{
    const res = await fetch(`${FIREBASE_DB_URL}/${STORAGE_KEY}.json`);
    const data = await res.json();
    products = Array.isArray(data) ? data : (data ? Object.values(data) : []);
    saveToLocalCache(products);
  }catch(e){
    if(!hadCache) products = [];
  }
  renderFilters();
  renderGrid();
}

async function saveCatalog(){
  try{
    const res = await fetch(`${FIREBASE_DB_URL}/${STORAGE_KEY}.json`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(products)
    });
    if(!res.ok){ alert("No se pudo guardar el catálogo. Probá de nuevo."); }
    else{ saveToLocalCache(products); }
  }catch(e){
    alert("No se pudo guardar el catálogo. Probá de nuevo.");
  }
}

function renderFilters(){
  const wrap = document.getElementById("filters");
  wrap.innerHTML = "";
}

function renderGrid(){
  const container = document.getElementById("gridContainer");
  const list = products;
  if(list.length === 0){
    container.innerHTML = isAdmin
      ? `<div class="empty"><h3>Todavía no subiste diseños</h3><p>Usá el formulario de arriba para sumar tu primera prenda.</p></div>`
      : `<div class="empty"><h3>Pronto vamos a subir nuevos diseños</h3><p>Volvé a pasar en unos días.</p></div>`;
    return;
  }
  container.innerHTML = `<div class="grid">${list.map(p => cardHtml(p)).join("")}</div>`;

  container.querySelectorAll(".img-box").forEach(el=>{
    el.addEventListener("click", ()=> openDetailModal(el.dataset.id));
  });
  if(isAdmin){
    container.querySelectorAll(".edit-btn").forEach(el=>{
      el.addEventListener("click", (e)=>{ e.stopPropagation(); startEdit(el.dataset.id); });
    });
    container.querySelectorAll(".delete-btn").forEach(el=>{
      el.addEventListener("click", (e)=>{ e.stopPropagation(); deleteProduct(el.dataset.id); });
    });
  }
}

function cardHtml(p){
  return `
  <div class="card">
    <div class="img-box" data-id="${p.id}">
      <img src="${p.image}" alt="Diseño Urban Castle" loading="lazy" decoding="async">
    </div>
    <div class="info">
      ${p.code ? `<div class="sizes">COD: ${escapeHtml(p.code)}</div>` : ""}
      ${p.price ? `<div class="price">$${escapeHtml(p.price)}</div>` : ""}
      ${p.sizes ? `<div class="sizes">TALLA: ${escapeHtml(p.sizes)}</div>` : ""}
      ${isAdmin ? `
      <div class="admin-actions">
        <button class="icon-btn edit-btn" data-id="${p.id}">Editar</button>
        <button class="icon-btn danger delete-btn" data-id="${p.id}">Borrar</button>
      </div>` : ""}
    </div>
  </div>`;
}

function openDetailModal(id){
  const p = products.find(x => x.id === id);
  if(!p) return;
  const root = document.getElementById("modalRoot");
  root.innerHTML = `
  <div class="modal-overlay" id="detailOverlay">
    <div class="modal">
      <img src="${p.image}" alt="Diseño Urban Castle">
      <div class="modal-body">
        ${p.code ? `<div class="sizes">COD: ${escapeHtml(p.code)}</div>` : ""}
        ${p.price ? `<div class="price">$${escapeHtml(p.price)}</div>` : ""}
        ${p.sizes ? `<div class="sizes">TALLA DISPONIBLE: ${escapeHtml(p.sizes)}</div>` : ""}
        <a class="modal-whatsapp" href="${buildWhatsappLink()}" target="_blank" rel="noopener noreferrer">${WHATSAPP_ICON} Consultar por WhatsApp</a>
        <button class="modal-close" id="closeDetail">Cerrar</button>
      </div>
    </div>
  </div>`;
  document.getElementById("detailOverlay").addEventListener("click", (e)=>{
    if(e.target.id === "detailOverlay") root.innerHTML = "";
  });
  document.getElementById("closeDetail").addEventListener("click", ()=> root.innerHTML = "");
}

function resizeImage(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        const maxW = 640;
        const scale = Math.min(1, maxW / img.width);
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", 0.62));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function renderAdminPanel(){
  const panel = document.getElementById("adminPanel");
  panel.innerHTML = `
  <div class="admin-form">
    <h2>${editingId ? "Editar prenda" : "Sumar nueva prenda"}</h2>
    <div class="form-row full">
      <div class="field">
        <label>Foto</label>
        <div class="upload-box ${pendingImageData ? 'has-img':''}" id="uploadBox">
          ${pendingImageData ? `<img src="${pendingImageData}">` : `<div class="upload-hint">Tocá para elegir una foto<br>desde tu celular o computadora</div>`}
          <input type="file" accept="image/*" id="fileInput">
        </div>
      </div>
    </div>
    <div class="form-row">
      <div class="field">
        <label>Código</label>
        <input type="text" id="fCode" placeholder="UC-001">
      </div>
      <div class="field">
        <label>Precio</label>
        <input type="text" id="fPrice" placeholder="25000">
      </div>
    </div>
    <div class="form-row full">
      <div class="field">
        <label>Talla</label>
        <input type="text" id="fSizes" placeholder="S, M, L, XL">
      </div>
    </div>
    <div id="formError"></div>
    <div class="form-actions">
      <button class="btn btn-primary" id="saveProductBtn">${editingId ? "Guardar cambios" : "Publicar prenda"}</button>
      ${editingId ? `<button class="btn btn-ghost" id="cancelEditBtn">Cancelar</button>` : ""}
    </div>
  </div>`;

  const uploadBox = document.getElementById("uploadBox");
  const fileInput = document.getElementById("fileInput");
  uploadBox.addEventListener("click", ()=> fileInput.click());
  fileInput.addEventListener("change", async ()=>{
    const file = fileInput.files[0];
    if(!file) return;
    try{
      pendingImageData = await resizeImage(file);
      renderAdminPanel();
      restoreFormValues();
    }catch(e){
      document.getElementById("formError").innerHTML = `<p class="error-msg">No se pudo procesar la imagen. Probá con otra foto.</p>`;
    }
  });

  document.getElementById("saveProductBtn").addEventListener("click", saveProduct);
  const cancelBtn = document.getElementById("cancelEditBtn");
  if(cancelBtn) cancelBtn.addEventListener("click", cancelEdit);

  if(editingId){
    const p = products.find(x=>x.id===editingId);
    if(p){
      document.getElementById("fCode").value = p.code || "";
      document.getElementById("fPrice").value = p.price || "";
      document.getElementById("fSizes").value = p.sizes || "";
    }
  }
}

let savedFormState = null;
function restoreFormValues(){
  if(savedFormState){
    document.getElementById("fCode").value = savedFormState.code;
    document.getElementById("fPrice").value = savedFormState.price;
    document.getElementById("fSizes").value = savedFormState.sizes;
  }
}

function startEdit(id){
  editingId = id;
  const p = products.find(x=>x.id===id);
  pendingImageData = p ? p.image : null;
  renderAdminPanel();
  window.scrollTo({top:0, behavior:"smooth"});
}

function cancelEdit(){
  editingId = null;
  pendingImageData = null;
  savedFormState = null;
  renderAdminPanel();
}

async function deleteProduct(id){
  const p = products.find(x=>x.id===id);
  if(!p) return;
  if(!confirm("¿Borrar esta prenda del catálogo?")) return;
  products = products.filter(x=>x.id!==id);
  await saveCatalog();
  renderFilters();
  renderGrid();
}

async function saveProduct(){
  savedFormState = {
    code: document.getElementById("fCode").value.trim(),
    price: document.getElementById("fPrice").value.trim(),
    sizes: document.getElementById("fSizes").value.trim()
  };
  const errEl = document.getElementById("formError");
  errEl.innerHTML = "";
  if(!pendingImageData){
    errEl.innerHTML = `<p class="error-msg">Subí una foto de la prenda.</p>`;
    return;
  }
  if(editingId){
    const p = products.find(x=>x.id===editingId);
    p.code = savedFormState.code;
    p.price = savedFormState.price;
    p.sizes = savedFormState.sizes;
    p.image = pendingImageData;
  }else{
    products.unshift({
      id: "p_" + Date.now() + "_" + Math.random().toString(36).slice(2,7),
      code: savedFormState.code,
      price: savedFormState.price,
      sizes: savedFormState.sizes,
      image: pendingImageData
    });
  }
  await saveCatalog();
  editingId = null;
  pendingImageData = null;
  savedFormState = null;
  renderAdminPanel();
  renderGrid();
}

function showPinModal(){
  const root = document.getElementById("modalRoot");
  root.innerHTML = `
  <div class="modal-overlay" id="pinOverlay">
    <div class="modal pin-modal">
      <div class="modal-body">
        <h3>Modo admin</h3>
        <p class="mono" style="color:var(--muted); font-size:12px; margin-bottom:14px;">Ingresá la contraseña para poder subir, editar o borrar prendas.</p>
        <input type="password" id="pinInput" placeholder="Contraseña" maxlength="40" autocomplete="current-password">
        <div id="pinError"></div>
        <div class="form-actions">
          <button class="btn btn-primary" id="pinSubmit" style="flex:1;">Ingresar</button>
          <button class="btn btn-ghost" id="pinCancel" style="flex:1;">Cancelar</button>
        </div>
      </div>
    </div>
  </div>`;
  const overlay = document.getElementById("pinOverlay");
  const input = document.getElementById("pinInput");
  input.focus();
  const submit = ()=>{
    if(input.value === ADMIN_PIN){
      isAdmin = true;
      root.innerHTML = "";
      applyAdminState();
    }else{
      document.getElementById("pinError").innerHTML = `<p class="error-msg">Contraseña incorrecta.</p>`;
    }
  };
  document.getElementById("pinSubmit").addEventListener("click", submit);
  input.addEventListener("keydown", (e)=>{ if(e.key==="Enter") submit(); });
  document.getElementById("pinCancel").addEventListener("click", ()=> root.innerHTML = "");
  overlay.addEventListener("click", (e)=>{ if(e.target.id==="pinOverlay") root.innerHTML=""; });
}

function applyAdminState(){
  const btn = document.getElementById("adminToggleBtn");
  const panel = document.getElementById("adminPanel");
  const heroSub = document.getElementById("heroSub");
  if(isAdmin){
    btn.textContent = "Salir del modo admin";
    btn.classList.add("active");
    panel.style.display = "block";
    heroSub.textContent = "Modo admin: subí, editá o borrá tus diseños.";
    renderAdminPanel();
  }else{
    btn.textContent = "Modo admin";
    btn.classList.remove("active");
    panel.style.display = "none";
    panel.innerHTML = "";
    heroSub.textContent = "Los diseños disponibles ahora. Tocá una prenda para ver el detalle.";
    editingId = null;
    pendingImageData = null;
  }
  renderGrid();
}

document.getElementById("adminToggleBtn").addEventListener("click", ()=>{
  if(isAdmin){
    isAdmin = false;
    applyAdminState();
  }else{
    showPinModal();
  }
});

loadCatalog();
</script>
